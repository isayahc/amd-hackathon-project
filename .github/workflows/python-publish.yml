name: Publish Backend to PyPI

on:
  push:
    tags:
      - "backend-v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Validate tag or release matches backend version
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        working-directory: backend
        run: |
          PACKAGE_VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_VERSION="${{ github.event.release.tag_name }}"
          else
            RELEASE_VERSION="${GITHUB_REF_NAME}"
          fi
          RELEASE_VERSION="${RELEASE_VERSION#backend-v}"
          RELEASE_VERSION="${RELEASE_VERSION#v}"
          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Release version ($RELEASE_VERSION) does not match backend package version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Build backend distribution
        working-directory: backend
        run: python -m build

      - name: Check distribution metadata
        working-directory: backend
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: agentcad-backend-dist
          path: backend/dist/*
          if-no-files-found: error

  publish:
    name: Publish package
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/agentcad-backend/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: agentcad-backend-dist
          path: dist

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
